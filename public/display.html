<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Público - Terminal CDE</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body class="display-body">
  <header class="display-header">
    <div>
      <h1>Terminal de Ómnibus CDE</h1>
      <p class="subtitle">Salidas en tiempo real</p>
    </div>
    <div class="display-clock-block">
      <div id="displayDate" class="display-date"></div>
      <div id="displayClock" class="display-clock"></div>
    </div>
  </header>
  <main class="display-main">
    <section id="alertBanner" class="alert-banner hidden"></section>
    <section class="kpi-grid display-kpis">
      <div class="kpi-card"><span>Total viajes</span><strong id="displayKpiTotal">0</strong></div>
      <div class="kpi-card"><span>En hora</span><strong id="displayKpiEnHora">0</strong></div>
      <div class="kpi-card"><span>Atrasados</span><strong id="displayKpiAtrasados">0</strong></div>
      <div class="kpi-card"><span>Cancelados</span><strong id="displayKpiCancelados">0</strong></div>
    </section>
    <section class="panel-card">
      <div class="card-header"><h2>Salidas activas</h2></div>
      <div class="table-wrapper">
        <table class="data-table display-table">
          <thead>
            <tr>
              <th>Empresa</th>
              <th>Ruta</th>
              <th>Fecha</th>
              <th>Hora prog.</th>
              <th>Hora real</th>
              <th>Estado</th>
              <th>Observación</th>
            </tr>
          </thead>
          <tbody id="displayTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
